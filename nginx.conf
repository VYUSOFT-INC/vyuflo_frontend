server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # SPA + Vite-built assets; connect-src allows same-origin API proxying
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com https://login.microsoftonline.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; frame-src 'self' https://accounts.google.com https://login.microsoftonline.com https://www.linkedin.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # SPA fallback: any unknown path returns index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
