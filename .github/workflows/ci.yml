name: CI

on:
  pull_request:
    branches: [dev, staging, pre-live, main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Vite bakes these at build time — placeholders are enough to verify the build.
          VITE_API_BASE_URL: https://ci.example.com/api/v1
          VITE_GOOGLE_CLIENT_ID: ci-placeholder
          VITE_MICROSOFT_CLIENT_ID: ci-placeholder
          VITE_MICROSOFT_TENANT_ID: common
          VITE_LINKEDIN_CLIENT_ID: ci-placeholder
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # No test runner yet — this step is ready once you add Vitest (npm test).
      - name: Run tests
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            npm test
          else
            echo "No test script in package.json — skipping. Add Vitest and a \"test\" script to enable this job."
          fi
