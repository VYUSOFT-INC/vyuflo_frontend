name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, pre-live, prod]

jobs:
  deploy:
    name: Deploy → ${{ github.event.inputs.environment }} (${{ github.ref_name }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ github.event.inputs.environment == 'staging' && secrets.STAGING_HOST || secrets.HOST }}
          username: ${{ github.event.inputs.environment == 'staging' && secrets.STAGING_USER || secrets.USER }}
          key: ${{ github.event.inputs.environment == 'staging' && secrets.STAGING_SSH_KEY || secrets.SSH_KEY }}
          script: |
            cd /opt/vyuflo-${{ github.event.inputs.environment }}/frontend

            git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/VYUSOFT-INC/vyuflo_frontend.git
            git pull origin ${{ github.ref_name }}

            cd /opt/vyuflo-${{ github.event.inputs.environment }}

            if [ "${{ github.event.inputs.environment }}" = "dev" ]; then
              export PORT=3000
            else
              export PORT=80
            fi

            docker compose -f docker-compose.${{ github.event.inputs.environment }}.yml build --build-arg PORT=$PORT frontend
            docker compose -f docker-compose.${{ github.event.inputs.environment }}.yml up -d frontend
